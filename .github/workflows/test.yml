name: Auto Test Labs

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-lab1-bintree:
    name: Test BinTree (Lab 1)
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential g++-11
    
    - name: Configure CMake
      run: |
        mkdir -p build
        cd build
        cmake .. -DCMAKE_CXX_COMPILER=g++-11
    
    - name: Build all BinTree tests
      run: |
        cd build
        make -j$(nproc)
    
    - name: Run BinTree tests
      continue-on-error: true
      run: |
        cd build
        # Запускаем тесты, которые начинаются с bintree_
        for test in $(ctest -N | grep -o 'bintree_[^ ]*' | sort -u); do
          echo "=== Running $test ==="
          ./$test
        done
    
    - name: Report BinTree results
      if: always()
      run: |
        echo "BinTree tests completed"

  test-lab2-rbtree:
    name: Test RBTree (Lab 2)
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential g++-11
    
    - name: Configure CMake
      run: |
        mkdir -p build
        cd build
        cmake .. -DCMAKE_CXX_COMPILER=g++-11
    
    - name: Build all RBTree tests
      run: |
        cd build
        make -j$(nproc)
    
    - name: Run RBTree tests
      continue-on-error: true
      run: |
        cd build
        # Запускаем тесты, которые начинаются с rbtree_
        for test in $(ctest -N | grep -o 'rbtree_[^ ]*' | sort -u); do
          echo "=== Running $test ==="
          ./$test
        done
    
    - name: Report RBTree results
      if: always()
      run: |
        echo "RBTree tests completed"
  
  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [test-lab1-bintree, test-lab2-rbtree]
    if: always()
    steps:
    - run: |
        echo "## 📊 Test Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "✅ All tests have completed" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Lab 1: BinTree" >> $GITHUB_STEP_SUMMARY
        echo "### Lab 2: RBTree" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Check individual job results above for details." >> $GITHUB_STEP_SUMMARY